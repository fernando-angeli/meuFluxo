server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: meufluxo

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      acks: all
      properties:
        enable.idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: meufluxo-cashmovement
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.meufluxo.*"
        spring.json.value.default.type: com.meufluxo.messaging.events.CashMovementEvent

  flyway:
    enabled: false

logging:
  level:
    root: INFO

security:
  jwt:
    secret: ${JWT_SECRET:meufluxo-super-secret-jwt-key-2026-minimum-32-bytes}
    expiration: ${JWT_EXPIRATION:3600000}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

