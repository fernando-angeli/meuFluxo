services:
  meufluxo_db_prod:
    image: postgres:16-alpine
    profiles: ["prod"]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_PROD_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: ${DB_PROD_NAME}
    environment:
      POSTGRES_DB: ${DB_PROD_NAME}
      POSTGRES_USER: ${DB_PROD_USER}
      POSTGRES_PASSWORD: ${DB_PROD_PASSWORD}
    ports:
      - "${DB_PROD_PORT}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped

  meufluxo_db_dev:
    image: postgres:16-alpine
    profiles: ["dev"]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_DEV_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: ${DB_DEV_NAME}
    environment:
      POSTGRES_DB: ${DB_DEV_NAME}
      POSTGRES_USER: ${DB_DEV_USER}
      POSTGRES_PASSWORD: ${DB_DEV_PASSWORD}
    ports:
      - "${DB_DEV_PORT}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    container_name: meufluxo_api
    profiles: ["prod"]
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      meufluxo_db_prod:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_PROD_NAME}:${DB_PROD_PORT}/${DB_PROD_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_PROD_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PROD_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
      LOG_DIR: /app/logs
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    restart: no
#    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: meufluxo_kafka
    ports:
      - "9092:9092"
    environment:
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: meufluxo_kafka_ui
    ports:
      - "8088:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=meufluxo
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka

  loki:
    image: grafana/loki:3.4.2
    container_name: meufluxo_loki
    profiles: ["obs"]
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.2
    container_name: meufluxo_promtail
    profiles: ["obs"]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/meufluxo:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.6.0
    container_name: meufluxo_grafana
    profiles: ["obs"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - loki

volumes:
  postgres_prod_data:
    name: meufluxo_postgres_prod_data
  postgres_dev_data:
    name: meufluxo_postgres_dev_data
  loki_data:
    name: meufluxo_loki_data
  grafana_data:
    name: meufluxo_grafana_data
