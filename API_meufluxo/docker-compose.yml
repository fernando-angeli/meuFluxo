services:

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: meufluxo_rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: meufluxo
      RABBITMQ_DEFAULT_PASS: meufluxo
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  loki:
    image: grafana/loki:3.4.2
    container_name: meufluxo_loki
    profiles: ["obs"]
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.2
    container_name: meufluxo_promtail
    profiles: ["obs"]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/meufluxo:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.6.0
    container_name: meufluxo_grafana
    profiles: ["obs"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - loki

volumes:
  loki_data:
    name: meufluxo_loki_data
  grafana_data:
    name: meufluxo_grafana_data
