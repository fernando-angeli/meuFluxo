server:
  port: ${SERVER_PORT:8088}
  servlet:
    context-path: /api

spring:
  application:
    name: meufluxo

  data:
    web:
      pageable:
        max-page-size: 100

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:meufluxo}
    password: ${RABBITMQ_PASS:meufluxo}
    management:
      port: ${RABBITMQ_MANAGEMENT_PORT:15672}
    template:
      mandatory: true

  flyway:
    enabled: false

logging:
  level:
    root: INFO

security:
  jwt:
    secret: ${JWT_SECRET:meufluxo-super-secret-jwt-key-2026-minimum-32-bytes}
    expiration: ${JWT_EXPIRATION:3600000}
  refresh-token:
    expiration: ${REFRESH_TOKEN_EXPIRATION:2592000000}
    cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:mf_refresh_token}
    cookie-path: ${REFRESH_TOKEN_COOKIE_PATH:/}
    same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
    secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
    http-only: true
    cookie-domain: ${REFRESH_TOKEN_COOKIE_DOMAIN:}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

#  jackson:
