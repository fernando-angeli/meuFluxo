spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/meufluxo_db_dev
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: meufluxo
    password: meufluxo

  flyway:
    enabled: false

security:
  refresh-token:
    secure: false
    same-site: Lax
    cookie-path: /
